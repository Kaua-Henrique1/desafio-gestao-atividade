openapi: 3.1.0
info:
  title: Task Management System - Kanban API
  description: |
    REST API for managing Kanban boards, columns, and tasks.
    - Board management (create, read, update)
    - Column management (CRUD + reordering)
    - Task drag-drop operations
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.taskmanagement.app/api
    description: Production server

paths:
  /boards:
    get:
      summary: List all boards for a team
      operationId: listBoards
      tags:
        - Boards
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: sprintId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a new board
      operationId: createBoard
      tags:
        - Boards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
      responses:
        '201':
          description: Board created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{id}:
    get:
      summary: Get board details with all columns and tasks
      operationId: getBoard
      tags:
        - Boards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Board details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardWithTasks'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update board settings
      operationId: updateBoard
      tags:
        - Boards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
      responses:
        '200':
          description: Board updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Delete board (archive, not physical delete)
      operationId: deleteBoard
      tags:
        - Boards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Board deleted
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{boardId}/columns:
    get:
      summary: Get all columns for a board
      operationId: listColumns
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of columns in order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Column'

    post:
      summary: Create new custom column
      operationId: createColumn
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
      responses:
        '201':
          description: Column created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{boardId}/columns/{id}:
    get:
      summary: Get column with its tasks
      operationId: getColumn
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Column with tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnWithTasks'

    patch:
      summary: Update column (name, metadata)
      operationId: updateColumn
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnRequest'
      responses:
        '200':
          description: Column updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Archive column (cannot delete, reassign tasks first)
      operationId: archiveColumn
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Column archived
        '400':
          description: Column still has tasks
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{boardId}/columns/reorder:
    post:
      summary: Reorder columns
      operationId: reorderColumns
      tags:
        - Columns
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                columnIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 5
                  description: Ordered list of all column IDs (fixed + custom)
      responses:
        '200':
          description: Columns reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Column'

  /tasks/{id}:
    get:
      summary: Get task details
      operationId: getTask
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update task (title, description, estimate, deadline, checklist)
      operationId: updateTask
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Delete task (only from Backlog)
      operationId: deleteTask
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted
        '400':
          description: Task not in Backlog

  /tasks/{id}/move:
    patch:
      summary: Move task to different column (drag-drop)
      operationId: moveTask
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                columnId:
                  type: string
                  format: uuid
                  description: Target column ID
                position:
                  type: integer
                  minimum: 0
                  description: Position within column (0 = top)
              required:
                - columnId
      responses:
        '200':
          description: Task moved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Task'
                  - type: object
                    properties:
                      previousColumn:
                        type: string
                        format: uuid
        '400':
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict - task already moved, client should refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks/{id}/checklist:
    patch:
      summary: Update checklist items
      operationId: updateChecklist
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChecklistItem'
              required:
                - items
      responses:
        '200':
          description: Checklist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'

  /tasks/{id}/assign-reviewer:
    patch:
      summary: Assign reviewer to task (when moving to Teste)
      operationId: assignReviewer
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewerId:
                  type: string
                  format: uuid
              required:
                - reviewerId
      responses:
        '200':
          description: Reviewer assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Reviewer must be different from executor
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        teamId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
        settings:
          type: object
          properties:
            allowDragBetweenColumns:
              type: boolean
              default: true
            lockEditWhenClosed:
              type: boolean
              default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - teamId
        - sprintId

    BoardWithTasks:
      allOf:
        - $ref: '#/components/schemas/Board'
        - type: object
          properties:
            columns:
              type: array
              items:
                $ref: '#/components/schemas/ColumnWithTasks'

    Column:
      type: object
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum:
            - Fixed
            - Custom
        sequence:
          type: integer
          minimum: 0
        isArchived:
          type: boolean
          default: false
        description:
          type: string
        metadata:
          type: object
          properties:
            color:
              type: string
              pattern: '^#[0-9A-Fa-f]{6}$'
            icon:
              type: string
            wipLimit:
              type: integer
              minimum: 1
      required:
        - id
        - boardId
        - name
        - type
        - sequence

    ColumnWithTasks:
      allOf:
        - $ref: '#/components/schemas/Column'
        - type: object
          properties:
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/Task'

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        columnId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
        estimatedPoints:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 5
            - 8
            - 13
        executor:
          $ref: '#/components/schemas/UserSummary'
        reviewer:
          $ref: '#/components/schemas/UserSummary'
          nullable: true
        deadline:
          type: string
          format: date-time
        checklistItems:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'
        cancelReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - boardId
        - columnId
        - title
        - estimatedPoints
        - executor
        - deadline
        - checklistItems

    ChecklistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
          minLength: 5
          maxLength: 500
        completed:
          type: boolean
          default: false
        completedBy:
          type: string
          format: uuid
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - text
        - completed

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - Gestor
            - Executor
            - Revisor
      required:
        - id
        - name
        - email
        - role

    CreateBoardRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
        teamId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
      required:
        - name
        - teamId
        - sprintId

    UpdateBoardRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
        settings:
          type: object

    CreateColumnRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        metadata:
          type: object
      required:
        - name

    UpdateColumnRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        metadata:
          type: object

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
        estimatedPoints:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 5
            - 8
            - 13
        deadline:
          type: string
          format: date-time
        checklistItems:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'

    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string
      required:
        - statusCode
        - message

    ConflictError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            currentTask:
              $ref: '#/components/schemas/Task'
            hint:
              type: string
              example: "Task was moved by another user. Please refresh."

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

